<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/logo.PNG">
    <title>Login | Felipe Nascimento - Zouk Brasileiro e Lambada</title>
    <meta name="description" content="Acesse sua área restrita no site de Felipe Nascimento. Cursos de Zouk Brasileiro e Lambada.">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Login | Felipe Nascimento - Zouk Brasileiro e Lambada">
    <meta property="og:image" content="assets/logo.PNG">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .auth-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--color-bg);
            padding: 2rem;
            position: relative;
        }
        .auth-container {
            background-color: var(--color-bg-alt);
            padding: 3rem;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
        }
        .auth-logo {
            font-size: 2rem;
            font-weight: 800;
            color: var(--color-secondary);
            margin-bottom: 2rem;
            display: inline-block;
        }
        .auth-container h2 {
            margin-bottom: 0.5rem;
        }
        .auth-container p {
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background-color: #fff;
            color: #000;
            padding: 1rem;
            border-radius: 50px;
            font-weight: 600;
            font-family: var(--font-main);
            border: none;
            cursor: pointer;
            transition: opacity var(--transition-fast);
            margin-bottom: 1.5rem;
            text-decoration: none;
        }
        .btn-google:hover {
            opacity: 0.9;
            color: #000;
        }
        .btn-google img {
            width: 20px;
            height: 20px;
        }
        .legal-check {
            display: flex;
            align-items: flex-start;
            text-align: left;
            gap: 10px;
            margin-bottom: 1rem;
        }
        .legal-check input {
            margin-top: 4px;
            accent-color: var(--color-secondary);
        }
        .legal-check label {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            line-height: 1.4;
        }
        .legal-check a {
            color: var(--color-secondary);
            text-decoration: underline;
        }
        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--color-text-muted);
            font-weight: 600;
        }
        .back-link:hover {
            color: var(--color-secondary);
        }
        @media (max-width: 480px) {
            .auth-section { padding: 1.5rem; padding-top: 4rem; }
            .auth-container { padding: 2rem 1.25rem; }
            .back-link { top: 1rem; left: 1rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <!-- Preloader Premium -->
    <div id="preloader">
        <div class="loader-content">
            <div class="loader-logo">FNZ</div>
        </div>
    </div>
    
    <section class="auth-section">
        <a href="index.html" class="back-link"><i class="ph ph-arrow-left"></i> Voltar</a>
        <div class="auth-container fade-in-section">
            <a href="index.html" class="auth-logo">FNZ</a>
            <h2>Bem-vindo(a)</h2>
            <p>Acesse o portal exclusivo de alunos e assinantes.</p>

            <form id="loginForm">
                <!-- Legal requirements -->
                <div class="legal-check">
                    <input type="checkbox" id="termsCheck" required>
                    <label for="termsCheck">Li e concordo com os <a href="#">Termos de Uso</a> e a <a href="#">Política de Privacidade</a>.</label>
                </div>
                <div class="legal-check" style="margin-bottom: 2rem;">
                    <input type="checkbox" id="marketingCheck">
                    <label for="marketingCheck">Aceito receber promoções, informações sobre novos cursos e conteúdo VIP no meu e-mail (Opcional).</label>
                </div>

                <div style="margin-bottom: 2rem;">
                    <input type="email" id="userEmail" placeholder="Seu e-mail" style="width: 100%; padding: 1rem; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; margin-bottom: 1rem; font-family: inherit;">
                    <button type="button" class="btn btn-primary" style="width: 100%; padding: 1rem; border-radius: 50px;" onclick="handleEmailLogin()">
                        Enviar Link de Acesso
                    </button>
                    <p style="font-size: 0.8rem; color: var(--color-text-muted); margin-top: 1rem;">Você receberá um link no seu e-mail para entrar sem precisar de senha.</p>
                </div>
            </form>
            <p id="errorMsg" style="color: #ff5555; font-size: 0.85rem; display: none; margin-top: 1rem;">Por questões de segurança e privacidade, você precisa aceitar os Termos de Uso antes de continuar.</p>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>

    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/5561981266368?text=Olá%20Felipe!%20Vim%20pelo%20site%20e%20gostaria de%20mais%20informações." class="whatsapp-float" target="_blank" aria-label="Falar no WhatsApp">
        <i class="ph ph-whatsapp-logo"></i>
    </a>
</body>
</html>
